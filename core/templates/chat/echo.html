{% extends "base.html" %}



{% block content %}
    

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 bg-secondary col-md-6 mt-5 p-2 rounded">

                <textarea name="" class="form-control border-2 border-info bg-dark text-light" style="height: 400px;" id="Console">
                <========== Log ==========>
                </textarea>

                <br>
                <p>
                    <div class="">
                        <input type="text" class="form-control border-2 border-info bg-dark text-light mb-1 form-sm" id="echo-input">
                        <button type="button" class="btn btn-dark" id="send-text">Send</button>
                    </div>
                </p>

            </div>
        </div>
    </div>



<script>
    const websocket = new WebSocket("ws://"+ window.location.host + "/ws/echo/")
    

    websocket.onmessage = function(event){
        const text = event.data;

        document.getElementById("Console").value += ">> "+text+ "\n";
    }

    document.getElementById("send-text").addEventListener("click", function(){
        send_text_to_echo()
    })

    function send_text_to_echo(){
        const text_input = document.getElementById("echo-input");
        websocket.send(data= text_input.value);
        text_input.value = "";
    }


</script>

{% endblock content %}
